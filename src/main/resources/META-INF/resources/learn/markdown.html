<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HUB-WOW - Demo Template</title>

    <!-- External Dependencies (CDN) -->
    <!-- KaTeX: LaTeX Math Support -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>

    <!-- Markdown-it: Markdown Parser -->
    <script src="https://cdn.jsdelivr.net/npm/markdown-it@13.0.1/dist/markdown-it.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/markdown-it-texmath/texmath.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/markdown-it-texmath/css/texmath.min.css">

    <!-- Highlight.js: Code Syntax Highlighting -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

    <!-- DOMPurify: HTML Content Sanitization -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;500;700&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">

    <!-- Local Styles & Shared Logic -->
    <link rel="stylesheet" href="styles.css">
    <script src="layout.js"></script>
    <script src="md-engine.js"></script>
</head>

<body>
    <!-- Sidebar (Injected automatically by Layout.init()) -->
    <div id="sidebar-wrapper"></div>

    <main class="main-content">
        <!-- Reusable Hero Section (Injected by Layout.renderHero()) -->
        <div id="hero-wrapper"></div>

        <!-- Markdown Content Container -->
        <div class="content-container" id="app-root">
            <!-- Content rendered by MdEngine will appear here -->
        </div>
    </main>

    <script>
        // ─────────────────────────────────────────────────────────────────
        // TOP BAR CONFIG — edit this to customise the top navigation for
        // this page. Children arrays create dropdown menus.
        // ─────────────────────────────────────────────────────────────────
        const TOP_BAR_LINKS = [
            { name: 'Home', url: 'home.html' },
            {
                name: 'Learn', url: '#',
                children: [
                    { name: 'System Design', url: 'system-design.html' },
                    {
                        name: 'Documentation', url: '#', children: [
                            { name: 'Markdown', url: 'markdown.html' }
                        ]
                    },
                ]
            }
        ];

        // Define your markdown content here
        const DEMO_CONTENT = [
            '# 1. What is *Markdown*?',
            '- Markdown is a simple language, which uses some simple symbols to **format text**',
            '- It is widely used since it is *easy to use* in messaging, blogging, and documentation',
            '- It was invented by Alex Gruber, but he didnt standardise it as he thought that everyone has different needs.',
            '- Many implementations of Markdown have been made, but the most popular one is CommonMark, which supports features like tables and diagrams.',
            '',
            '',
            '## 2. Introduction to Markdown',
            '- Markdown is a lightweight language that helps you to write formatted text using simple symbols.',
            '- It is widely used for documentation, blogs, and even websites because of its simplicity and readability.',
            '',
            '### 2.1 Basic Syntax',
            '- *Headings*: Use `#` for headings. More `#` in a row means smaller heading.',
            '- *Italics*: Use `*` or `_`.',
            '- *Bold*: Use `**` or `__`.',
            '- *Lists*: Use `-` or `*`. You can stack them for more indentation.',
            '- *Links*: Use `[text](url)` format for adding hyperlinks.',
            '- *Images*: Use `![alt text](image_url)` for adding images. The image_url can be a local directory or an external link.',
            '- *Code*: Use triple backticks to start and end a code block.',
            '',
            '## ⚙️ Technical Support',
            '',
            '### Code Highlighting',
            '```javascript',
            'function hello() {',
            '    console.log("Hello hub-WOW!");',
            '}',
            '```',
            '',
            '### LaTeX Mathematics',
            'Mathematical formulas are supported natively:',
            '$$ E = mc^2 $$',
            '',
            '### Automatic Table of Contents',
            'Look at the sidebar on the left! All your headings are automatically parsed and added to the navigation for easy scrolling.',
            '',
            '## 🛠 Next Steps',
            '1. Edit this file (`markdown.html`).',
            '2. Update the `DEMO_CONTENT` array with your own markdown lines.',
            '3. Add your page to `TOP_BAR_LINKS` in the script block if it is a permanent addition.',
        ].join('\n');

        window.addEventListener('DOMContentLoaded', () => {
            // 1. Initialize the shared layout (Sidebar, Top bar, Resize logic)
            Layout.init({ topBarLinks: TOP_BAR_LINKS });

            // 2. Render the Hero Section
            Layout.renderHero('hero-wrapper', {
                logo: 'logo.svg',       // Optional: Set to null if no logo
                title: 'Markdown',
                subtitle: 'A clean starting point for your next website.',
                tagline: 'Built with hub-WOW Core Architecture'
            });

            // 3. Render the Markdown content
            const root = document.getElementById('app-root');
            const toc = document.getElementById('sidebar-nav-list'); // Injected by Layout.init()

            MdEngine.render(DEMO_CONTENT, root, toc);

        });
    </script>
</body>

</html>
