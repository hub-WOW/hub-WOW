<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>hub-WOW</title>

    <link rel="stylesheet" href="styles.css">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/markdown-it-texmath/css/texmath.min.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;700&family=JetBrains+Mono:wght@400&display=swap"
        rel="stylesheet">
</head>

<body>

    <aside id="sidebar">
        <div
            style="padding: 40px 25px; font-family: 'JetBrains Mono'; color: var(--accent); font-size: 0.65rem; letter-spacing: 5px; font-weight: bold;">
            HUB-WOW // CORE</div>
        <nav id="toc" style="flex: 1; overflow-y: auto;"></nav>
    </aside>

    <main id="stage">
        <div class="container" id="app-root"></div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/markdown-it@13.0.1/dist/markdown-it.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/markdown-it-texmath/texmath.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>

    <script>
        /**
         * INITIALIZATION
         * We setup the Markdown engine once at the start.
         */
        const md = window.markdownit({ html: true }).use(texmath, { engine: katex, delimiters: 'dollars' });
        const root = document.getElementById('app-root');
        const toc = document.getElementById('toc');

        /**
         * CORE FUNCTION: updateSystem(content)
         * This handles the entire lifecycle of the document:
         * 1. Parsing 2. Sanitizing 3. Splitting into Sections 4. Rendering
         */
        async function updateSystem(content) {
            // Convert Markdown to HTML and Clean it for Security
            const rawHtml = md.render(content);
            const cleanHtml = DOMPurify.sanitize(rawHtml, {
                ADD_TAGS: ['math', 'mrow', 'mi', 'mo', 'mn', 'msup', 'mspace', 'annotation', 'semantics', 'img']
            });

            // Turn the HTML string into actual DOM nodes we can work with
            const temp = document.createElement('div');
            temp.innerHTML = cleanHtml;
            const nodes = Array.from(temp.children);

            // Clear current view
            root.innerHTML = '';
            toc.innerHTML = '';

            // Sectioning Logic: Creates a new container every time we hit a heading
            let currentSection = createSection('start');

            nodes.forEach(node => {
                // Break section on H1, H2, or H3 tags
                if (['H1', 'H2', 'H3'].includes(node.tagName)) {
                    root.appendChild(currentSection);
                    addTocLink(currentSection.id, node.innerText);

                    // Create unique ID for the section based on text
                    const safeId = node.innerText.toLowerCase().replace(/[^\w]+/g, '-');
                    currentSection = createSection(safeId);
                }
                currentSection.appendChild(node.cloneNode(true));
            });
            root.appendChild(currentSection);

            // Initialize the Scroll-Spy (Observer)
            setupObserver();
        }

        /**
         * HELPER: createSection
         * Generates a section container with our animation classes.
         */
        function createSection(id) {
            const sec = document.createElement('section');
            sec.id = id || `sec-${Math.random().toString(36).substr(2, 5)}`;
            sec.className = 'section-box';
            return sec;
        }

        /**
         * HELPER: addTocLink
         * Adds a clickable navigation item to the sidebar.
         */
        function addTocLink(id, title) {
            const a = document.createElement('a');
            a.className = 'toc-link';
            a.href = `#${id}`;
            a.innerText = `> ${title}`;
            a.onclick = (e) => {
                e.preventDefault();
                document.getElementById(id).scrollIntoView({ behavior: 'smooth' });
            };
            toc.appendChild(a);
        }

        /**
         * SYSTEM: setupObserver
         * Watches which section is on screen and highlights the sidebar accordingly.
         */
        function setupObserver() {
            const observer = new IntersectionObserver(entries => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('visible'); // Trigger fade-in
                        document.querySelectorAll('.toc-link').forEach(link => {
                            link.classList.toggle('active', link.getAttribute('href') === `#${entry.target.id}`);
                        });
                    }
                });
            }, { threshold: 0.1 });

            document.querySelectorAll('.section-box').forEach(s => observer.observe(s));
        }

        /**
         * DRAG AND DROP
         * Allows you to drop any .md file to update the site instantly.
         */
        window.addEventListener('dragover', e => { e.preventDefault(); document.body.style.opacity = 0.5; });
        window.addEventListener('dragleave', () => document.body.style.opacity = 1);
        window.addEventListener('drop', e => {
            e.preventDefault();
            document.body.style.opacity = 1;
            const file = e.dataTransfer.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (ev) => updateSystem(ev.target.result);
                reader.readAsText(file);
            }
        });

        /**
         * FULL ORIGINAL MANIFESTO (THE HUB-WOW SOUL)
         * This contains all your original info as the default state.
         */
        const ORIGINAL_MANIFESTO = `# hub-WOW
![Logo](Logo.svg)

## What is *this*?

* Build a **global network of thinkers, revolutionaries, and doers**.
* Launch collaborative **projects that have real-world impact**.
* Inspire individuals to **take charge of their potential** and drive positive change.
* Develop **educational resources, workshops, and events** to empower everyone, everywhere.

* **Awaken** the mind, body, and soul and channelise it towards a purpose.
* **Connect** people with interests and expertise, to form a uniques space, where ideas come together and form a vision.
* **Ideate** and discuss about various fields, to build a mental compass of ethics to navigate through life.
* **Innovate** by encouraging creative solutions and open discussions, without any judgement or censorship.
* **Contribute** by sharing your knowledge, projects, and ideas, and help others grow too.

* [Simeosis](https://github.com/hub-WOW/Simeosis): A completely private, cryptographically safe, fast, notes and journalling app.
* [Kouventa](https://github.com/hub-WOW/Kouventa): A private, cryptographically safe, transparent, and secure communication platform with intuitive UI.

* **Collaboration & Support** – Success matters only when you leave a mark of excellent legacy on this world, and that is only possible with collaboration and support.

## Why Join?

* Develop an internal sense of responsibility, judgement, and discipline to act towards **excellence**.
* Share your own **projects, ideas, and discoveries**.
* Collaborate with a **supportive and motivated people**, who just as you are, yet perform and achieve high.
* Stay updated on the latest trends and views in **technology, science, history and culture**.

## Get Committed
1. Join our community platforms on [Discord](https://discord.gg/XYtvzQXyf) and [our website](https://hub-wow.fyi).
2. Participate in discussions and events.
3. Share content, projects, and resources.
4. Help build a community where ideas sprout and mature.
5. Track and evaluate yourself daily, and progress.

---
*hub-WOW is more than a community, it’s a movement towards a better, free, open and progressive world.*`;

        // Initial Boot
        updateSystem(ORIGINAL_MANIFESTO);
    </script>
</body>

</html>
